<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <title>Træningsplan Editor</title>

  <link rel="stylesheet" href="vendor/jsoneditor.min.css">
  <link rel="stylesheet" href="css/style.css">

  <script src="vendor/jsoneditor.min.js"></script>
</head>

<body>

  <!-- =====================================================
       TOP MENU (layout only – no colors added)
       ===================================================== -->
  <header class="app-header" role="banner">
    <div class="menu-left">
      <span class="app-title">Træningsplan Editor</span>
    </div>

    <nav class="menu-center" aria-label="Primær navigation">
      <button class="menu-item" type="button" onclick="document.getElementById('sidebar')?.scrollIntoView({behavior:'smooth', block:'start'});">
        Planer
      </button>
      <button class="menu-item" type="button" onclick="document.getElementById('main')?.scrollIntoView({behavior:'smooth', block:'start'});">
        Oversigt
      </button>
      <button class="menu-item" type="button" onclick="document.getElementById('editorPanel')?.scrollIntoView({behavior:'smooth', block:'start'});">
        Rediger pas
      </button>
    </nav>

    <div class="menu-right" aria-label="Hurtig handlinger">
      <button class="menu-item" type="button" onclick="newPlan()">+ Ny</button>
      <button class="menu-item" type="button" onclick="savePlan()">Gem</button>
      <button class="menu-item" type="button" onclick="savePlanAs()">Gem som</button>
      <button class="menu-item" type="button" onclick="exportPlan()">Export</button>
      <button class="menu-item" type="button" onclick="importPlan()">Import</button>
    </div>
  </header>

  <!-- =====================================================
       EXISTING LAYOUT (unchanged)
       ===================================================== -->
  <div id="sidebar">
    <h2>Planer</h2>

    <button onclick="newPlan()">+ Ny plan</button>

    <div id="planLibrary"></div>

    <button onclick="savePlan()">Gem plan</button>
    <button onclick="savePlanAs()">Gem som ny</button>
    <button onclick="exportPlan()">Eksportér</button>
    <button onclick="importPlan()">Importér</button>

    <hr>

    <h2>Uger</h2>
    <div id="weekList"></div>
    <button onclick="addSession()">+ Tilføj pas</button>
  </div>

  <div id="main"></div>

  <div id="editorPanel">
    <h2>Rediger pas</h2>
    <div id="sessionEditor">Vælg et pas…</div>

    <h3>JSON</h3>
    <div id="jsonPreview"></div>
  </div>

  <script src="js/library.js"></script>
  <script src="js/segments.js"></script>
  <script src="js/autocalc.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
