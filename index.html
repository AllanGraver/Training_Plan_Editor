<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Træningsplan editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-title">Træningsplan editor</div>
    <button id="themeToggle" class="theme-toggle">Tema</button>
  </header>

  <div class="app-shell">
    <!-- VENSTRE PANEL / SIDEBAR -->
    <aside id="sidebar">
      <h3>Træningsplaner:</h3>
      <div id="planList"></div>

      <button onclick="newPlan()">+ Ny</button>
      <button onclick="savePlan()">💾 Gem</button>
      <button onclick="savePlanAs()">💾 Gem som</button>
      <button onclick="exportPlan()">⬇️ Eksport</button>
      <button onclick="importPlan()">⬆️ Import</button>


      <h3>Træningsuge oversigt:</h3>
      <div id="weekButtons"></div>
    </aside>

    <!-- MIDTERPANEL -->
    <main id="mainPanel">
      <h2 id="mainTitle">Ugens træningspas:</h2>
      <div id="main" tabindex="-1"></div>
      <button id="addSessionBtn" onclick="addSession()">+ Tilføj træningspas</button>
    </main>

    <!-- HØJRE PANEL / EDITOR -->
    <aside id="editorPanel">
      <div id="sessionEditor">Vælg et træningspas…</div>

      <h3>JSON preview</h3>
      <pre id="jsonPreview"></pre>
    </aside>
  </div>

  <script src="js/weeks.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/steps.js"></script>
  <script src="js/segments.js"></script>
  <script src="js/library.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
