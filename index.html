<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <title>Træningsplan Editor</title>

  <!-- JSONEditor via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:,">
</head>

<body>

  <!-- =====================================================
       HEADER – Strava orange + toggle til højre
       ===================================================== -->
  <header class="app-header" role="banner">
    <span class="app-title">Træningsplan Editor</span>
    <button id="themeToggle" class="theme-toggle">Light mode</button>
  </header>

  <!-- =====================================================
       APP SHELL
       ===================================================== -->
  <div class="app-shell">

    <!-- =====================================================
         SIDEBAR – Planer + Uger + Handlinger
         ===================================================== -->
    <div id="sidebar" tabindex="-1">

      <h2>Planer</h2>

      <button onclick="newPlan()">+ Ny plan</button>

      <div id="sidebarPlans"></div>

      <button onclick="savePlan()">Gem plan</button>
      <button onclick="savePlanAs()">Gem som</button>
      <button onclick="exportPlan()">Eksportér</button>
      <button onclick="importPlan()">Importér</button>

      <hr>

      <h2>Uger</h2>
      <div id="weekList"></div>

      <button onclick="addSession()">+ Tilføj pas</button>
    </div>

    <!-- =====================================================
         MAIN – Oversigt over ugens pas
         ===================================================== -->
    <div id="main" tabindex="-1"></div>

    <!-- =====================================================
         EDITOR PANEL – Rediger valgt pas
         ===================================================== -->
    <div id="editorPanel" tabindex="-1">
      <h2>Rediger pas</h2>
      <div id="sessionEditor">Vælg et pas…</div>

      <h3>JSON</h3>
      <div id="jsonPreview"></div>
    </div>

  </div>

  <!-- =====================================================
       SCRIPTS (versioneret for at undgå cache)
       ===================================================== -->
  <!-- =====================================================
     SCRIPTS (versioneret for at undgå cache)
     ===================================================== -->
  <script src="js/app.js?v=3"></script>
  <script src="js/library.js?v=3"></script>
  <script src="js/weeks.js?v=3"></script>
  <script src="js/sessions.js?v=3"></script>
  <script src="js/steps.js?v=3"></script>
  <script src="js/segments.js?v=3"></script>
  <script src="js/autocalc.js?v=3"></script>


</body>
</html>
