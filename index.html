<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <title>Træningsplan Editor</title>

  <!-- JSONEditor via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="app-header" role="banner">
    <div class="menu-left">
      <span class="app-title">Træningsplan Editor</span>
    </div>

    <nav class="menu-center" aria-label="Primær navigation">
      <button class="menu-item" type="button"
        onclick="document.getElementById('sidebar')?.focus()">
        Planer
      </button>

      <button class="menu-item" type="button"
        onclick="document.getElementById('main')?.focus()">
        Oversigt
      </button>

      <button class="menu-item" type="button"
        onclick="document.getElementById('editorPanel')?.focus()">
        Rediger pas
      </button>
    </nav>

    <div class="menu-right" aria-label="Hurtig handlinger">
      <button class="menu-item" type="button" onclick="newPlan()">+ Ny</button>
      <button class="menu-item" type="button" onclick="savePlan()">Gem</button>
      <button class="menu-item" type="button" onclick="savePlanAs()">Gem som</button>
      <button class="menu-item" type="button" onclick="exportPlan()">Eksportér</button>
      <button class="menu-item" type="button" onclick="importPlan()">Importér</button>
    </div>
  </header>

  <div class="app-shell">

    <div id="sidebar" tabindex="-1">
      <h2>Planer</h2>

      <button onclick="newPlan()">+ Ny plan</button>

      <div id="planLibrary"></div>

      <button onclick="savePlan()">Gem plan</button>
      <button onclick="savePlanAs()">Gem som ny</button>
      <button onclick="exportPlan()">Eksportér</button>
      <button onclick="importPlan()">Importér</button>

      <hr>

      <h2>Uger</h2>
      <div id="weekList"></div>
      <button onclick="addSession()">+ Tilføj pas</button>
    </div>

    <div id="main" tabindex="-1"></div>

    <div id="editorPanel" tabindex="-1">
      <h2>Rediger pas</h2>
      <div id="sessionEditor">Vælg et pas…</div>

      <h3>JSON</h3>
      <div id="jsonPreview"></div>
    </div>

  </div>

  <!-- Versioneret for at undgå cache -->
  <script src="js/library.js?v=2"></script>
  <script src="js/segments.js?v=2"></script>
  <script src="js/autocalc.js?v=2"></script>
  <script src="js/ui.js?v=2"></script>
  <script src="js/app.js?v=2"></script>

</body>
</html>
